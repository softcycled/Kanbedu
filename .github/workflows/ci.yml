name: CI

on:
  push:
    branches: [ "main", "dev", "overnight" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Type check
      run: npx tsc --noEmit

    - name: Lint
      run: npx eslint src/ --max-warnings 150

    - name: Run tests
      run: npx vitest run

    - name: Build (verify no compile errors)
      run: npx next build
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
        DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
        NEXT_PUBLIC_APP_URL: "http://localhost:3000"
        DISCORD_WEBHOOK_URL: "https://discord.com/api/webhooks/mock"
        JWT_SECRET: "mock-secret-for-ci-builds-only"
        KANBEDU_JWT_SECRET: "mock-secret-for-ci-builds-only"
